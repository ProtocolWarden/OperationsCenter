# OperationsCenter — worker and watcher definitions
#
# Migrated from .context/config.yaml (P3 of work order
# PlatformDeployment/docs/architecture/adr/0002-work-order-manifest-cognition.md).
# CL guard flags moved to the anchoring manifest's .context/config.yaml;
# OC-specific operational config (worker scopes, watchdog cycle, dispatch
# wiring) lives here in .console/ — OC's operational truth surface.

clp_version: "0.2"
repo: "OperationsCenter"

loop:
  # relaunch_command retired: the live loop is `cl loop run` (see
  # pseudo_operator below); tools/loop/controller.py is a thin exec shim.
  max_cycle_minutes: 60
  checkpoint_on_stop: true

# PseudoOperator (Track B): the watchdog session loop, driven by the shared
# engine in ContextLifecycle (`cl loop run --config .console/workers.yaml`).
# Fail-closed schema — unknown keys refuse the launch. Backends default to
# the fleet-standard claude/opus/codex ladder (claude-sonnet-5 first).
pseudo_operator:
  loop_name: oc
  session_prompt_file: tools/loop/oc_session_prompt.txt
  session_timeout_seconds: 2700          # 45min hard wall per session
  max_iterations: 200                    # enforced cap (OC's old loop had NONE)
  max_consecutive_failures: 5            # non-rate-limit failures
  env_file: .env.operations-center.local # fleet env sourced into sessions
  log_file: logs/local/loop_controller.log
  delay:
    kind: schedule_state                 # session-written health state
    default_delay_seconds: 600           # STALLED-equivalent fallback
    state_delays:
      CRITICAL: 180
      DEGRADED: 300
      STALLED: 600
      ACTIVE: 900
      PARKED_OPERATOR_BLOCKED: 1800
      HEALTHY: 3600
  hooks:
    # OC-specific behaviors ported from the old controller — see
    # operations_center/entrypoints/loop_bridge/main.py.
    pre_iteration: [".venv/bin/python", "-m", "operations_center.entrypoints.loop_bridge.main", "self-update"]
    seed_cooldowns: [".venv/bin/python", "-m", "operations_center.entrypoints.loop_bridge.main", "seed-cooldowns"]
    on_cooldown: [".venv/bin/python", "-m", "operations_center.entrypoints.loop_bridge.main", "on-cooldown"]
    # Post-session invariant enforcement: return a stranded clean checkout to
    # main and open a PR for the session's pushed-but-PR-less branch. The
    # prompt's STEP 10 asks sessions to do this; the hook guarantees it.
    session_end: [".venv/bin/python", "-m", "operations_center.entrypoints.loop_bridge.main", "session-end"]
    # Subscription budget guard (operator directive 2026-07-13): leave ~25% of
    # every 5h claude bucket unspent. Emits {claude/opus: bucket_end|null};
    # the engine merges extend-only, so over-budget diverts the ladder to codex.
    budget_guard: [".venv/bin/python", "-m", "operations_center.entrypoints.loop_bridge.main", "budget-guard"]

workers:
  - id: "investigation-worker"
    task: "bounded investigation of a failing invariant or blocker"
    max_minutes: 30
    max_tool_calls: 75
    allowed_paths:
      - ".console/"
      - "src/"
      - "tests/"
    forbidden_paths:
      - ".console/tmp/"
    allowed_subagents: 1
    mutation_policy: "write_allowed"

watchers:
  - id: "invariant-watcher"
    description: "watches for failing invariants or execution boundary violations"
    watch_path: ".console/"
    trigger_on: "failure"
    dispatch_worker: "investigation-worker"
