# Runtime binding policy — task-shape → model selection.
#
# SwitchBoard picks the lane (claude_cli / codex_cli / aider_local). This
# file picks what powers it (opus / sonnet / haiku, etc.). The first rule
# whose `when:` matches wins; the `default:` block applies when no rule
# matches.
#
# The `bind:` block is translated into a CxRP RuntimeBinding. Validity is
# checked against CxRP's kind × selection_mode table on construction —
# invalid combos raise at config load time, not at runtime.
#
# This file is loaded by ExecutionCoordinator. Its absence is non-fatal:
# the bundled DEFAULT_POLICY in runtime_binding_policy.py is used instead.

rules:
  - name: refactor_balanced
    when:
      task_type: refactor
      lane: claude_cli
    bind:
      kind: cli_subscription
      provider: anthropic
      model: opus
      config_ref: team_executor:premium

  - name: feature_balanced
    when:
      task_type: feature
      lane: claude_cli
    bind:
      kind: cli_subscription
      provider: anthropic
      model: opus
      config_ref: team_executor:premium

  - name: refactor_codex_balanced
    when:
      task_type: refactor
      lane: codex_cli
    bind:
      kind: cli_subscription
      provider: openai
      model: gpt-5.4
      config_ref: team_executor:premium

  - name: feature_codex_balanced
    when:
      task_type: feature
      lane: codex_cli
    bind:
      kind: cli_subscription
      provider: openai
      model: gpt-5.4
      config_ref: team_executor:premium

  - name: test_balanced
    when:
      task_type: test_fix
      lane: claude_cli
    bind:
      kind: cli_subscription
      provider: anthropic
      model: sonnet
      config_ref: team_executor:default

  - name: test_codex_balanced
    when:
      task_type: test_fix
      lane: codex_cli
    bind:
      kind: cli_subscription
      provider: openai
      model: gpt-5.4
      config_ref: team_executor:default

  - name: lint_cheap
    when:
      task_type: lint_fix
      lane: claude_cli
    bind:
      kind: cli_subscription
      provider: anthropic
      model: haiku
      config_ref: team_executor:budget

  - name: lint_codex_cheap
    when:
      task_type: lint_fix
      lane: codex_cli
    bind:
      kind: cli_subscription
      provider: openai
      model: gpt-5.4-mini
      config_ref: team_executor:budget

default:
  bind:
    kind: cli_subscription
    provider: anthropic
    model: sonnet
    config_ref: team_executor:default
