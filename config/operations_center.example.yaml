# Operations Center configuration template.
# Copy to config/operations_center.local.yaml and fill in your values.
# This file is safe to commit. Your local copy is gitignored.
#
# Split model:
#   This file holds structure and behaviour (safe to version).
#   .env.operations-center.local holds secrets and runtime knobs (never commit).
#   Fields named *_env reference environment variable NAMES, not values.

# ---------------------------------------------------------------------------
# Plane board connection
# ---------------------------------------------------------------------------
plane:
  base_url: http://localhost:8080       # URL of your local Plane instance
  api_token_env: PLANE_API_TOKEN        # env var holding your Plane API token
  workspace_slug: operations-center         # Plane workspace slug
  project_id: <your-plane-project-uuid> # Plane project UUID

# ---------------------------------------------------------------------------
# Git behaviour
# ---------------------------------------------------------------------------
git:
  provider: github
  token_env: GITHUB_TOKEN               # env var holding your GitHub token (global fallback)
  open_pr_default: false                # open a PR by default after push (per-repo overrides this)
  push_on_validation_failure: true      # push a draft branch even when validation fails
  author_name: Operations Center Bot
  author_email: operations-center-bot@example.com
  sign_commits: false
  signing_key: null                     # GPG key ID if sign_commits: true

# ---------------------------------------------------------------------------
# Team executor settings
# ---------------------------------------------------------------------------
# See src/operations_center/backends/team_executor/
team_executor:
  team_name: budget                  # debug-phase baseline; later phases may promote based on task classification
  timeout_seconds: 3600
  worker_backend: claude_code          # preferred worker backend; codex_cli is used when Claude is cooling down
  dynamic_team_selection: false        # keep tiering static while pipeline behavior is being debugged
  dynamic_worker_backend_selection: true
  budget_pressure_threshold: 0.75

# ---------------------------------------------------------------------------
# DAG executor settings
# ---------------------------------------------------------------------------
dag_executor:
  tier_name: budget
  timeout_seconds: 3600
  worker_backend: claude_code          # preferred worker backend; codex_cli is used when Claude is cooling down
  dynamic_tier_selection: false        # later phases can re-enable dynamic promotion
  dynamic_worker_backend_selection: true
  budget_pressure_threshold: 0.75

# ---------------------------------------------------------------------------
# Critique executor settings
# ---------------------------------------------------------------------------
critique_executor:
  tier_name: budget
  topology: reflexion
  max_rounds: 5
  timeout_seconds: 3600
  worker_backend: claude_code          # preferred worker backend; codex_cli is used when Claude is cooling down
  working_dir: ""
  dynamic_tier_selection: false        # later phases can re-enable dynamic promotion
  dynamic_worker_backend_selection: true
  budget_pressure_threshold: 0.75

# ---------------------------------------------------------------------------
# Wire-all S3 — opt-in activation of four otherwise-inert subsystems
# ---------------------------------------------------------------------------
# Each block below is OFF by default. Omitting it (or leaving the values as
# shown) reproduces today's fleet behavior EXACTLY. Uncomment + change a value
# to activate. See docs/design/INERT_MACHINERY_INVENTORY.md items 2–5.

# Per-task model-tier selection (RuntimeBindingPolicy). DEFAULT = static team
# tier for every task. When enabled, the executor model varies by (task_type,
# lane): opus for refactor/feature, sonnet for tests, haiku for lint, sonnet
# fallback. policy_path is relative to this config file; omit it to use the
# bundled DEFAULT_POLICY.
# runtime_binding:
#   enabled: true
#   policy_path: runtime_binding_policy.yaml

# Bounded execution retry/backoff (RecoveryPolicy). DEFAULT = single-shot
# (max_attempts=1) — the adapter is called once and its result is final.
# Raising max_attempts retries TRANSIENT/TIMEOUT/BACKEND_UNAVAILABLE failures.
# SAFETY: non-idempotent requests (the live default — they write/commit/push)
# are never retried regardless of max_attempts; only certified pre-send
# failures and idempotent requests retry.
# recovery:
#   max_attempts: 3
#   max_delay_seconds: 30.0
#   retry_unknowns: false
#   unknown_retry_limit: 0

# Autonomous blocked-queue healer (QueueHealingEngine). DEFAULT = the
# maintenance loop never runs it. When true, each maintenance cycle recycles
# retry-safe Blocked tasks back to Ready-for-AI/Backlog and escalates
# budget-exhausted lineages via a comment. NON-DESTRUCTIVE (never deletes work).
# queue_healing_enabled: true

# Autonomous parked-state unpark loop. DEFAULT = the maintenance loop never
# runs it; an empty parked-state store is a no-op regardless. When true, each
# cycle re-evaluates the parked root cause and unparks it once its board
# evidence changes. Only ever clears/refreshes state/recovery/parked.json.
# parked_unpark_enabled: true

# ---------------------------------------------------------------------------
# Repos
# ---------------------------------------------------------------------------
# At least one repo is required. The repo key (e.g. "MyRepo") must match the
# value used in the "repo: <key>" label on Plane work items.
#
# Minimal single-repo example:
repos:
  MyRepo:
    clone_url: git@github.com:owner/MyRepo.git
    default_branch: main
    sandbox_base_branch: operations-center-testing-branch  # optional staging target for autonomous runs
    validation_commands:               # all must exit 0 for a push to be allowed
      - .venv/bin/pytest -q
      - .venv/bin/ruff check .
    allowed_base_branches:             # only these branches may be used as PR base
      - main
      - operations-center-testing-branch
    bootstrap_enabled: true            # create venv + install deps before each run
    python_binary: python3
    venv_dir: .venv
    install_dev_command: .venv/bin/pip install -e .[dev]

# ---------------------------------------------------------------------------
# Multi-repo example (uncomment and adapt as needed):
# ---------------------------------------------------------------------------
#   FrontendRepo:
#     clone_url: git@github.com:owner/FrontendRepo.git
#     default_branch: dev
#     validation_commands: []           # skip validation for non-Python repos
#     allowed_base_branches:
#       - dev
#       - main
#       - release-*                     # fnmatch patterns are supported
#     bootstrap_enabled: false
#     python_binary: python3
#     venv_dir: .venv
#     install_dev_command: null
#
#     # Per-repo GitHub token override (must match token_env in this block):
#     token_env: GITHUB_TOKEN_FRONTEND
#
#     # PR review loop: open a PR and run a verdict-gated self-review before merge.
#     # Self-review emits LGTM or CONCERNS.
#     #   LGTM     → merge. This is the ONLY merge path.
#     #   CONCERNS → a fix pass resolves the concerns on the PR branch and pushes,
#     #              then re-reviews; up to reviewer.max_fix_attempts cycles.
#     #   Exhausted (or no parseable verdict) → close the PR and re-queue the
#     #              issue for a fresh attempt. A PR is never merged half-finished.
#     await_review: true
#
#     # Green CI is a PRECONDITION for merge, not a merge trigger: while CI is red
#     # the PR waits; once green it still must pass the verdict-gated self-review
#     # above (green CI alone does not prove the issue is complete).
#     auto_merge_on_ci_green: true
#
#     # Include this repo in idle-board proposer scans (default: true).
#     propose_enabled: true
#
#     # Use a local checkout for proposer inspection instead of SSH clone.
#     # This is faster for repos you already have checked out locally.
#     local_path: /home/dev/Documents/GitHub/FrontendRepo
#
#     # Dry-run PR creation: log what would happen without actually
#     # creating or merging the PR. Useful for testing the automation path.
#     # Can also be set globally via OPERATIONS_CENTER_PR_DRY_RUN=1 in .env.
#     # pr_dry_run: false

# ---------------------------------------------------------------------------
# Reviewer settings (optional — all fields have safe defaults)
# ---------------------------------------------------------------------------
# reviewer:
#   # GitHub logins whose comments are always ignored (CI bots, integration accounts, etc.)
#   bot_logins: []
#   # If non-empty, only comments from these logins are honored. Empty = any non-bot.
#   allowed_reviewer_logins: []
#   # Max fix→review cycles on a CONCERNS verdict before the PR is closed and the
#   # issue re-queued for a fresh attempt (default: 6). Never a merge cap — only
#   # an LGTM verdict merges.
#   max_fix_attempts: 6
#   # Retry cap for passes that produce NO parseable verdict (crash/timeout); after
#   # this many the PR is closed + re-queued rather than merged blind (default: 2).
#   max_self_review_loops: 2
#   # HTML marker appended to every bot-posted comment — prevents re-processing own comments.
#   bot_comment_marker: "<!-- operations-center:bot -->"

# ---------------------------------------------------------------------------
# Scheduled tasks — periodic Plane work-item seeders
# ---------------------------------------------------------------------------
# Each entry creates one Ready-for-AI task at the configured cadence.
# The propose cycle is the scheduler — there is no separate cron daemon.
# `every` is required (<num><unit>, unit in m/h/d/w); `at` (HH:MM UTC) and
# `on_days` (mon/tue/.../sun) are optional gates. See
# src/operations_center/scheduled_tasks/runner.py for the implementation
# and docs/operator/weekly_audits.md for the audit-cadence runbook.
#
# scheduled_tasks:
#   - every:    1w
#     at:       "13:00"
#     on_days:  [mon]
#     title:    "Weekly audit triage"
#     repo_key: OperationsCenter
#     kind:     goal
#     goal: |
#       Run custodian-sweep + ghost_audit + flow_audit and triage results.
#       See docs/operator/weekly_audits.md for the full runbook.

# ---------------------------------------------------------------------------
# Artifact storage root
# ---------------------------------------------------------------------------
report_root: tools/report/execution_plane

# ---------------------------------------------------------------------------
# Platform Manifest 4-layer composition (PlatformManifest v1.0+)
# ---------------------------------------------------------------------------
# OC consumes a merged EffectiveRepoGraph from PlatformManifest's
# `load_effective_graph(base, private, project/work_scope, local)`. The
# platform base is always the bundled `platform_manifest.yaml` (public
# topology). A private-manifest layer adds private platform truth; a
# project/work-scope layer adds project-scoped overlays; a local layer annotates existing nodes with allowlisted
# fields (local_path, local_port, env_file, endpoint_override,
# cache_path, gpu_required, runtime_hints).
#
# When configured, OC's coordinator logs structured contract-impact
# warnings pre-dispatch (e.g.
#   "contract change in CxRP affects 4 consumer(s) [public=3 private=1]: …")
# and attaches a `contract_impact` block to the observability record.
#
# Defaults: enabled=true, all paths None → platform-only graph.
# Set false to skip composition entirely.
#
# Private-manifest discovery: when `private_manifest_path` is unset and
# `project_slug` is known, OC looks for
# `<private-manifest-repo>/manifests/<project_slug>/private_manifest.yaml`
# (or a sibling private-manifest repo from the provided repo_root).
#
# v0.3+ supports ONE project manifest per OC instance — to switch projects,
# update the paths or run OC from inside that project's repo (cwd
# convention may pick up `<repo_root>/topology/project_manifest.yaml`).
#
# See docs/operator/manifest_wiring.md for the full operator runbook
# and docs/operator/manifest_authoring.md for project-manifest authoring.
#
# platform_manifest:
#   enabled: true
#   project_slug: <managed-repo>              # for PlatformDeployment LocalManifest discovery
#   private_manifest_path: <private-manifest-repo>/manifests/<project-slug>/private_manifest.yaml
#   project_manifest_path: /home/dev/Documents/GitHub/<managed-repo>/topology/project_manifest.yaml
#   local_manifest_path:   /home/dev/Documents/GitHub/<managed-repo>/topology/local_manifest.yaml

# ---------------------------------------------------------------------------
# Cross-repo task chaining (R5 — operations-center-propagate)
# ---------------------------------------------------------------------------
# When a contract repo changes, walk the impact set and create Plane
# tasks for downstream consumers. Disabled by default — opt in
# deliberately. See docs/operator/manifest_wiring.md for the full
# operator runbook including pair_overrides for trusted-pair
# auto-promotion.
#
# contract_change_propagation:
#   enabled: false                          # nothing fires until you opt in
#   auto_trigger_edge_types: []             # e.g. [depends_on_contracts_from]
#   dedup_window_hours: 24                  # suppress same key within window
#   pair_overrides:                         # per-(target, consumer) trust
#     - target_repo_id: cxrp
#       consumer_repo_id: operations_center
#       action: ready_for_ai                # skip | backlog | ready_for_ai
#       reason: trusted pair
#   record_dir: state/propagation           # PropagationRecord artifacts
#   dedup_path: state/propagation/dedup.json

# ---------------------------------------------------------------------------
# Global resource gate (optional)
# ---------------------------------------------------------------------------
# Reserves host headroom for co-tenant workloads sharing this box. The
# gate runs *before* per-backend caps so a mix of small dispatches
# across many backends still can't drain the budget reserved for
# co-tenants. Both fields are optional; an empty resource_gate: block
# means "no global gate" and only per-backend caps fire.
#
# Calibration:
#   max_concurrent           — total in-flight dispatches across ALL
#                              backends. A safe default is one less
#                              than the sum of your per-backend
#                              max_concurrent values, so at least one
#                              backend slot stays free at saturation.
#   min_available_memory_mb  — pre-dispatch /proc/meminfo check. Set
#                              this to the memory the *co-tenant*
#                              pipelines on this host need to make
#                              forward progress. 12288 MB (12 GiB)
#                              is a conservative starting point.
#
# resource_gate:
#   max_concurrent: 6
#   min_available_memory_mb: 12288
