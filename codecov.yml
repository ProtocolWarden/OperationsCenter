codecov:
  require_ci_to_pass: true
  after_n_builds: 1

coverage:
  precision: 2
  round: down
  range:
    - 70
    - 100

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_carryforward_flags: false

ignore:
  - "tests"
  - "setup.py"

flag_carryforward_mode: "all"
