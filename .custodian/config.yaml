  # .console/ reconciled (reconcile/console) — R1/R2 reconcile detectors active.
  reconcile_enforce: true
  # r1_enabled: false — disable the built-in R1 line-budget reconcile checker.
  # The custom plugin R1 (build_oc_detectors) also registers as "R1" and overwrites
  # the pattern entry, but total_findings accumulates counts from both, causing a
  # phantom 2-finding CI failure on log.md (1920 ln) and backlog.md (442 ln) that
  # doesn't appear in the findings array. The custom R1 handles .console/ checks;
  # the built-in line-budget signal is not actionable in CI.
  r1_enabled: false
  # W2 (core.hooksPath must be set): developer-machine setup check, not applicable
  # in CI where the repo is freshly cloned and git config is not persisted.
  ignore_rules:
    - W2
    # P3: plumbing path-fragment check requires the reader repo to be
    # checked out alongside OC (../OperatorConsole/). In CI, only OC is
    # present — the reader path doesn't exist so P3 always fires a
    # false "reader not found" finding. P1/P2 still run and verify
    # key presence in the writer; P3 adds no signal in single-repo CI.
    - P3
  # C1/C6 (TODO/FIXME markers): exclude paths where TODO/FIXME appear as
  # strings being analysed (todo_signal, todo_accumulation, artifact_writer)
  # or in comments already tagged [deferred, reviewed] and covered by OC2.
  # C2 (print statements): entrypoints are CLI tools that write to stdout
  # deliberately; two library files have print() only in docstring examples.
  # C13 allowed paths: OC reads env vars for service configuration across several
  # modules. The config layer (config/) is the canonical place; other modules
  # read env vars for their own config (execution paths, tuning thresholds,
  # provider setup). These are accepted patterns, not architectural debt.
  # T3 env-gate hints: these phrases near a pytest.skip() indicate the skip
  # is conditional on a missing tool, env var, or service — not unconditional.
  t3_env_gate_hints:
    - "aider"
    - "switchboard"
    - "OPERATIONS_CENTER_"
    - "shutil.which"
    - "pkg_path"
    - "not present"

  c13_allowed_paths:
    - "src/operations_center/config/**"
    - "src/operations_center/observer/coverage_config.py"
    - "src/operations_center/observer/cli.py"
    - "src/operations_center/entrypoints/**"
    - "src/operations_center/openclaw_shell/**"
    - "src/operations_center/adapters/workspace/**"
    - "src/operations_center/tuning/**"
    - "src/operations_center/proposer/**"
    - "src/operations_center/audit_dispatch/**"
    - "src/operations_center/execution/**"
    - "src/operations_center/backends/**"
    - "src/operations_center/routing/**"
    - "src/operations_center/executors/**"
    - "tests/**"

  cross_repo:
    platform_manifest_repo: ../PlatformManifest

  # CAP1 — enforce that the capabilities this repo owns (board_unblock) point at
  # invocation.ref code that actually resolves here. Anti-rot for the registry.
  capabilities:
    enforce: true

  plumbing:
    # P1/P2/P3: OC heartbeat JSON → OperatorConsole stale-role check.
    # Reader uses mtime only; P2 ignore_keys suppresses pid-check dict accesses
    # (alive, pid, mtime) that appear in the same function as "heartbeat_".
    - id: heartbeat
      writer_glob: "src/operations_center/entrypoints/*/main.py"
      reader_path: "../OperatorConsole/src/operator_console/watcher_status_pane.py"
      written_keys: [role, at, status]
      path_fragment: "heartbeat_"
      ignore_keys: [alive, pid, mtime]
    # P1/P2/P3: OC usage.json → OperatorConsole budget/rate display.
    # written_keys covers top-level keys + event object keys (both written
    # by usage_store.py). P2 ignore_keys suppresses TUI state dict accesses
    # (resources, backend_usage, resource_gate, budget sub-dicts) that appear
    # in functions sharing "usage.json" UI labels or docstrings.
    - id: usage
      writer_glob: "src/operations_center/execution/usage_store.py"
      reader_path: "../OperatorConsole/src/operator_console/watcher_status_pane.py"
      written_keys:
        # top-level object keys
        - updated_at
        - events
        - hourly_exec_count
        - daily_exec_count
        - task_attempts
        - last_task_signatures
        - task_artifacts
        - skipped_due_to_budget
        - skipped_due_to_noop
        - skipped_due_to_cooldown
        - blocked_due_to_retry_cap
        - suppressed_due_to_proposal_budget
        # event object keys (nested inside events[])
        - kind
        - task_id
        - timestamp
        - backend
        - id
      path_fragment: "usage.json"
      # Keys accessed in the same scoped functions but on TUI state dicts,
      # not on the usage.json object itself.
      ignore_keys:
        # TUI state snapshot keys (aggregated from multiple sources)
        - backend_usage
        - resource_gate
        - resources
        - budget
        - found
        # budget sub-dict keys (computed, not from usage.json)
        - daily_cap
        - daily_used
        - hourly_cap
        - hourly_used
        # rate limit display keys (computed from hourly/daily caps at display time)
        - max_per_day
        - max_per_hour
        # per-backend counter keys (built by _per_backend_live_counters)
        - hourly
        - daily
        - in_flight
        # system resource sub-dict keys (from _sys_resources)
        - load
        - load_pct
        - max_concurrent
        - mem_pct
        - mem_total_gb
        - mem_used_gb
        - min_available_memory_mb
        - num_cores
        - swap_pct
        - swap_total_gb
        - swap_used_gb
    # P1/P2/P3: OC spec-author campaigns state → OperatorConsole campaign pane.
    # (Package renamed from spec_director to spec_author per ADR 0007 Phase F.)
    - id: campaigns
      writer_glob: "src/operations_center/spec_author/state.py"
      reader_path: "../OperatorConsole/src/operator_console/watcher_status_pane.py"
      written_keys: [campaigns]
      path_fragment: "active.json"

