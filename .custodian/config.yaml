      # scheduled tasks: datetime parse failure → treat as never run (correct)
      - src/operations_center/scheduled_tasks/runner.py
      # spec director: date parse on archival, state file load
      - src/operations_center/spec_author/spec_writer.py
      - src/operations_center/spec_author/state.py
      # tuning: calibration/metrics/compare calculations — one bad record skipped
      - src/operations_center/tuning/calibration.py
      - src/operations_center/tuning/compare.py
      - src/operations_center/tuning/metrics.py
      # fixture harvesting: file write failure on best-effort copy
      - src/operations_center/fixture_harvesting/writer.py
      # mini regression: test-run failure in analysis loop
      - src/operations_center/mini_regression/runner.py
      # proposer: integration step failure — skip candidate
      - src/operations_center/proposer/candidate_integration.py
      # audit dispatch: process cleanup (SIGTERM fallback)
      - src/operations_center/audit_dispatch/executor.py
      # behavior calibration: unresolvable artifact path — skip rule
      - src/operations_center/behavior_calibration/rules.py
      # spec director phase orchestrator: one best-effort traceability append
      - src/operations_center/spec_author/phase_orchestrator.py
    C9:
      # Entrypoints are polling workers (same rationale as C4); broad catches
      # prevent one bad work item from aborting the whole cycle. The cycle logs
      # aggregate outcomes via artifact files, not per-exception logger calls.
      - src/operations_center/entrypoints/**
      # Analytics / signal collection — one bad record or failing collector must
      # not crash the analysis pass. Errors surface in artifact-level counts.
      - src/operations_center/insights/derivers/**
      - src/operations_center/observer/collectors/**
      - src/operations_center/observer/service.py  # _collect_required re-raises; _collect_optional now logs
      - src/operations_center/tuning/**
      # Backend normalisers: parse best-effort; return None/[] on any decode failure
      - src/operations_center/backends/**
      # Adapter layer: GitHub API calls return [] / None on any transport error;
      # callers decide whether to retry or skip.
      - src/operations_center/adapters/github_pr.py
      # Structured error capture — exception message stored in a result/error list,
      # not silently discarded:
      - src/operations_center/audit_dispatch/executor.py
      - src/operations_center/proposer/backlog_promoter.py
      - src/operations_center/proposer/candidate_integration.py
      - src/operations_center/behavior_calibration/rules.py
      # Best-effort / non-fatal defensive fallbacks (documented per-file):
      - src/operations_center/audit_governance/runner.py  # budget/cooldown state now logs warnings
      - src/operations_center/autonomy_tiers/config.py
      - src/operations_center/config/drift.py
      - src/operations_center/execution/validation.py
      - src/operations_center/execution/workspace.py
      - src/operations_center/insights/loader.py
      - src/operations_center/mini_regression/runner.py
      - src/operations_center/post_merge_regression.py
      - src/operations_center/priority_scans.py
      - src/operations_center/reconcile_running.py
      - src/operations_center/scheduled_tasks/runner.py
      - src/operations_center/spec_author/context_bundle.py
      - src/operations_center/spec_author/phase_orchestrator.py
      - src/operations_center/spec_author/recovery.py
      - src/operations_center/spec_author/spec_writer.py
    C29:
      # Entrypoint main files are necessarily large — they wire together the full
      # worker lifecycle (arg parsing, signal handling, retry loops, artifact
      # writes). Splitting them would fragment cohesion without adding clarity.
      # snapshot_repository: implements 3 distinct backend adapters (local, S3, HTTP)
      # behind a unified abstract interface — splitting would fragment the cohesive
      # interface pattern without architectural benefit.
      - src/operations_center/observer/snapshot_repository.py
      # snapshot_validator: implements the full validation pipeline across many
      # signal categories — single responsibility, cannot cleanly split.
      - src/operations_center/observer/snapshot_validator.py
      - src/operations_center/entrypoints/board_worker/main.py
      - src/operations_center/entrypoints/setup/main.py
      - src/operations_center/entrypoints/autonomy_cycle/main.py
      - src/operations_center/entrypoints/pr_review_watcher/main.py
      # usage_store: one file, one responsibility — tracks token/cost usage with
      # many storage/query/aggregation methods. A clean boundary, not monolithic.
      - src/operations_center/execution/usage_store.py
      # policy engine: declarative rule evaluation over many rule types — each
      # rule type needs its own evaluation method; cannot reasonably be split.
      - src/operations_center/policy/engine.py
      # settings.py is the canonical settings registry — all OC config lives
      # in one Pydantic settings module by design.
      - src/operations_center/config/settings.py
      # coordinator.py is OC's execution coordinator (central dispatcher).
      - src/operations_center/execution/coordinator.py
      # spec_hygiene/main.py wires the full spec-hygiene worker lifecycle.
      - src/operations_center/entrypoints/spec_hygiene/main.py
      # workspace.py manages the full workspace lifecycle (checkout, prep, cleanup)
      # across many code paths — single responsibility, cannot cleanly split.
      - src/operations_center/execution/workspace.py
      # board_unblock.py is a growing rules engine — each autonomous recovery rule
      # adds ~20 lines; splitting by rule would fragment context.
      - src/operations_center/entrypoints/maintenance/board_unblock.py
      # outcomes.py holds all board_worker outcome handlers (success/failure/follow-up/
      # CI loop) in one cohesive module. Splitting by handler type would fragment the
      # tightly coupled state transitions and Plane client calls.
      - src/operations_center/entrypoints/board_worker/outcomes.py
      # validation.py is the canonical per-collector validator library — all
      # artifact validation helpers live in one module by design.
      - src/operations_center/observer/validation.py
      # dashboard.py implements the full DashboardProvider with metrics, latency,
      # health, log, and flaky-test panels in one cohesive module — splitting by
      # panel type would fragment the shared snapshot generation and helper logic.
      - src/operations_center/observer/dashboard.py
      # github_pr.py is the canonical GitHub API adapter — all PR status checks,
      # check runs, review calls, and merge operations in one cohesive module.
      # Guard C (require ≥1 completed check) pushed it past 500 lines; splitting
      # by operation type would scatter the shared client and pagination helpers.
      - src/operations_center/adapters/github_pr.py
      # alert_channels.py implements all alert channel backends (Slack, Email,
      # GitHub, Plane, OperatorLog) plus the factory — each channel class is
      # self-contained; splitting by channel would scatter the shared AlertResult
      # and factory in ways that add indirection without clarity.
      - src/operations_center/observer/alert_channels.py
      # coverage_alert_channels.py implements all coverage-specific alert channel
      # backends (Slack, Email, GitHub, OperatorLog) plus router — same rationale
      # as alert_channels.py above.
      - src/operations_center/observer/coverage_alert_channels.py
      # coverage_trend_repository.py implements 3 distinct backend adapters (local,
      # S3, HTTP) behind a unified abstract interface — same rationale as
      # snapshot_repository.py above.
      - src/operations_center/observer/coverage_trend_repository.py
      # coverage_config.py is the canonical coverage alerting configuration registry
      # — all coverage thresholds and channel config live in one module by design.
      - src/operations_center/observer/coverage_config.py
      # models.py consolidates coverage-domain Pydantic models (snapshot, module,
      # file, trend, alert) — single-responsibility, cannot cleanly split.
      - src/operations_center/observer/models.py
      # coverage_trend_manager.py is the high-level trend analysis API — factory
      # methods, trend computation, historical queries, and alert integration are
      # all cohesively grouped; splitting by method type would scatter context.
      - src/operations_center/observer/coverage_trend_manager.py
      # coverage_alerting.py implements the full alert generation pipeline (threshold,
      # regression, trend, module-gap detection) plus categorization/filtering helpers
      # — single responsibility; splitting by alert type would break the shared config
      # and severity-mapping logic.
      - src/operations_center/observer/coverage_alerting.py
      # cli.py implements 8 Typer commands — one command per cohesive operation;
      # splitting by command would scatter the shared app, console, and exit-code defs.
      - src/operations_center/observer/cli.py
      # service.py manages the full collector lifecycle (required + optional collectors,
      # signal aggregation, error handling, debug logging) — single responsibility;
      # splitting by collector type or signal category would fragment the cohesive
      # service initialization and error propagation logic.
      - src/operations_center/observer/service.py
      # flaky_test_reporter.py implements the full flakiness detection pipeline (score
      # computation, entropy, variance, streak, recovery) — single responsibility;
      # splitting by metric type would fragment the shared reporter state and
      # session-level aggregation logic.
      - src/operations_center/observer/flaky_test_reporter.py
      # query.py implements the full observer query API — test signal, flaky test,
      # coverage, and snapshot queries in one cohesive module; splitting by signal
      # type would fragment the shared SnapshotManager and formatting helpers.
      - src/operations_center/observer/query.py
    C11:
      # Agent-spawning entrypoints: board_worker, intake, pr_review_watcher invoke
      # the coding backend (team_executor, aider, etc.) which runs for an unbounded
      # duration. A timeout would kill legitimate long-running tasks.
      - src/operations_center/entrypoints/board_worker/**
      - src/operations_center/entrypoints/intake/**
      - src/operations_center/entrypoints/pr_review_watcher/**
      # Interactive setup scripts run once by a human operator; timeouts would
      # interrupt interactive login flows and package installation.
      - src/operations_center/entrypoints/setup/**
      # Workspace bootstrap runs pip/npm install for repo setup — can take minutes.
      - src/operations_center/adapters/workspace/bootstrap.py
    C23:
      # shell=True is intentional in OC's orchestration layer — all commands come
      # from trusted YAML config (not user input) and may use shell features like
      # && chaining. Injection risk is acceptable given the trusted source.
      - src/operations_center/application/validation.py
      - src/operations_center/execution/workspace.py
      - src/operations_center/execution/baseline_validation.py
      - src/operations_center/adapters/workspace/bootstrap.py
      - src/operations_center/entrypoints/setup/main.py
      # shell=True in docstring "Never uses shell=True." — regex false positive
      - src/operations_center/audit_dispatch/executor.py
      # install_provider() runs npm/curl install commands from trusted YAML config
      - src/operations_center/entrypoints/setup/providers.py

  # Stale handler names cited in autonomy_gaps.md from a pre-board_worker
