      - tests/unit/er000_phase0_golden/test_golden.py
      - tests/unit/executors/test_startup_wiring.py
      # cl_wrap tests assert dispatch succeeds by absence of exception — no assert statement needed.
      - tests/unit/execution/test_coordinator_cl_wrap.py
      # Exporter tests verify graceful no-op / no-raise behavior — absence of exception is the assertion.
      - tests/unit/observer/test_validation_metrics_exporter.py
      # Snapshot test files define @pytest.fixture named test_snapshot — T2 false positive
